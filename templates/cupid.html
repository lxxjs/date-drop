<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Drop | Cupid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cupid.css') }}" />
</head>
<body class="cupid-body">
  <header class="topbar">
    <a href="/home" class="logo logo--dark">
      <svg class="logo-icon" viewBox="0 0 24 30" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.373 0 0 5.373 0 12c0 7.5 12 18 12 18S24 19.5 24 12C24 5.373 18.627 0 12 0zm0 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
      </svg>
      <span>date drop.</span>
    </a>

    <nav class="menu">
      <a href="/home">Home</a>
      <a href="/cupid" class="is-active">Cupid</a>
      <a href="/home">Matches</a>
      <a href="#">Profile</a>
    </nav>

    <button class="signout-btn" type="button" onclick="window.location.href='/'">Sign Out</button>
  </header>

  <main class="cupid-shell">
    <section class="cupid-hero">
      <div class="cupid-hero-overlay"></div>
      <div class="cupid-hero-content">
        <h1>Play cupid</h1>
        <p>List the emails of two people you want to see matched to boost their chances. Score 10 points if they match!</p>

        <form id="cupidForm" class="cupid-form">
          <input id="firstEmail" type="email" placeholder="First person's email" required />
          <input id="secondEmail" type="email" placeholder="Second person's email" required />
          <a href="#" class="search-link">Search student email</a>
          <button id="shipBtn" type="submit" class="ship-btn">Ship It! (4 left)</button>
          <p id="shipStatus" class="ship-status" aria-live="polite"></p>
        </form>

        <div class="cupid-slots">
          <div class="slot">?</div>
          <div class="slot">?</div>
          <div class="slot">?</div>
          <div class="slot">?</div>
        </div>
      </div>
    </section>

    <section class="leaderboard">
      <h2>Cupid leaderboard</h2>
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Cupid Initials</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>1</td><td>T.P.</td><td>20</td></tr>
          <tr><td>2</td><td>M.Q.</td><td>10</td></tr>
          <tr><td>3</td><td>A.L.</td><td>10</td></tr>
          <tr><td>4</td><td>Y.Z.</td><td>0</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/cupid.js') }}"></script>
</body>
</html>
