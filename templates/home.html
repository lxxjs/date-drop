<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Drop | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}" />
</head>
<body class="home-body">
  <header class="topbar">
    <a href="/home" class="logo logo--dark">
      <svg class="logo-icon" viewBox="0 0 24 30" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.373 0 0 5.373 0 12c0 7.5 12 18 12 18S24 19.5 24 12C24 5.373 18.627 0 12 0zm0 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
      </svg>
      <span>date drop.</span>
    </a>

    <nav class="menu">
      <a href="/home">Home</a>
      <a href="/cupid">Cupid</a>
      <a href="/home" class="is-active">Matches</a>
      <a href="#">Profile</a>
    </nav>

    <button class="signout-btn" type="button" id="signOutBtn">Sign Out</button>
  </header>

  <main class="home-shell">
    <!-- Inviter reveal banner (shown if user signed up via invite) -->
    <section id="inviterBanner" class="inviter-banner" hidden>
      <p><span id="inviterName"></span> invited you to Date Drop!</p>
    </section>

    <section class="matches-hero">
      <h1>Matches</h1>
    </section>

    <!-- Invite links section -->
    <section class="invite-section">
      <h2>Invite friends</h2>
      <p class="invite-section-sub">Share Date Drop with friends. You have <strong><span id="invitesRemaining">5</span></strong> invites left.</p>
      <button class="btn-primary" id="createInviteBtn">Create invite link</button>
      <div id="inviteList" class="invite-list"></div>
    </section>

    <!-- Matches or empty state rendered by home.js -->
  </main>

  <script>
    window.__SUPABASE_URL__ = {{ supabase_url | tojson }};
    window.__SUPABASE_ANON_KEY__ = {{ supabase_anon_key | tojson }};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="{{ url_for('static', filename='js/supabase-init.js') }}"></script>
  <script src="{{ url_for('static', filename='js/home.js') }}"></script>
</body>
</html>
