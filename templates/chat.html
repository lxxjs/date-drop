<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Drop | Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}" />
</head>
<body class="chat-body">
  <header class="topbar">
    <a href="/home" class="logo logo--dark">
      <svg class="logo-icon" viewBox="0 0 24 30" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.373 0 0 5.373 0 12c0 7.5 12 18 12 18S24 19.5 24 12C24 5.373 18.627 0 12 0zm0 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
      </svg>
      <span>date drop.</span>
    </a>

    <nav class="menu">
      <a href="/home">Home</a>
      <a href="/cupid">Cupid</a>
      <a href="/home">Matches</a>
    </nav>

    <a href="/home" class="btn-ghost btn-sm">Back to matches</a>
  </header>

  <main class="chat-shell">
    <div class="chat-messages" id="chatMessages">
      <p class="chat-loading">Loading messages...</p>
    </div>

    <form class="chat-input-bar" id="chatForm">
      <input
        type="text"
        id="chatInput"
        class="chat-input"
        placeholder="Type a message..."
        autocomplete="off"
        maxlength="2000"
        required
      />
      <button type="submit" class="chat-send-btn">Send</button>
    </form>
  </main>

  <script>
    window.__SUPABASE_URL__ = {{ supabase_url | tojson }};
    window.__SUPABASE_ANON_KEY__ = {{ supabase_anon_key | tojson }};
    window.__MATCH_ID__ = {{ match_id | tojson }};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="{{ url_for('static', filename='js/supabase-init.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
